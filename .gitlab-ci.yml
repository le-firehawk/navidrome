workflow:
  rules:
    - when: always

variables:
  IMAGE_SHA: "$CI_REGISTRY_NAME:sha-$CI_COMMIT_SHORT_SHA"

publish:
  image: docker:27
  services:
    - docker:27-dind
  script:
    - echo "$CI_REGISTRY_PASSWORD" | docker login -u "$CI_REGISTRY_USER" --password-stdin "$CI_REGISTRY"
    - |
      if [ -n "$CI_COMMIT_TAG" ]; then
        REF_TAG="$CI_COMMIT_TAG"
      else
        REF_TAG="$CI_COMMIT_REF_SLUG"
      fi

      docker build -f Dockerfile \
        -t "$CI_REGISTRY_IMAGE:$REF_TAG" \
        -t "$IMAGE_SHA" \
        .

      docker push "$CI_REGISTRY_IMAGE:$REF_TAG"

      if [ "$CI_COMMIT_BRANCH" = "master" ]; then
        docker tag "$IMAGE_SHA" "$CI_REGISTRY_IMAGE:latest"
        docker push "$CI_REGISTRY_IMAGE:latest"
      fi
  tags:
    - shared
